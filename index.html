 <body class="h-full overflow-auto" style="background: var(--bg-primary);">
  <div id="app" class="min-h-full flex flex-col items-center justify-center p-4"><!-- Header -->
   <div class="w-full max-w-sm mb-4 flex items-center justify-between">
    <h1 id="app-title" class="text-xl font-bold" style="color: var(--text-primary);">SimpleCalc</h1><button id="theme-toggle" class="mode-toggle p-2 rounded-full" style="background: var(--bg-tertiary);" aria-label="Toggle theme">
     <svg id="theme-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" style="color: var(--text-primary);"><path id="moon-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
     </svg></button>
   </div><!-- Calculator -->

     </div><!-- Current display -->

 font-semibold" style="background: var(--number-bg); color: var(--text-primary);" data-action="number" data-number="6">6</button> <button class="calc-btn operator-btn h-16 rounded-2xl text-2xl font-semibold text-white" style="background: var(--operator-bg);" data-action="operator" data-operator="−">−</button> <!-- Row 4 --> <button class="calc-btn number-btn h-16 rounded-2xl text-2xl font-semibold" style="background: var(--number-bg); color: var(--text-primary);" data-action="number" data-number="1">1</button> <button class="calc-btn number-btn h-16 rounded-2xl text-2xl font-semibold" style="background: var(--number-bg); color: var(--text-primary);" data-action="number" data-number="2">2</button> <button class="calc-btn number-btn h-16 rounded-2xl text-2xl font-semibold" style="background: var(--number-bg); color: var(--text-primary);" data-action="number" data-number="3">3</button> <button class="calc-btn operator-btn h-16 rounded-2xl text-2xl font-semibold text-white" style="background: var(--operator-bg);" data-action="operator" data-operator="+">+</button> <!-- Row 5 --> <button class="calc-btn number-btn h-16 rounded-2xl text-2xl font-semibold col-span-2" style="background: var(--number-bg); color: var(--text-primary);" data-action="number" data-number="0">0</button> <button class="calc-btn number-btn h-16 rounded-2xl text-2xl font-semibold" style="background: var(--number-bg); color: var(--text-primary);" data-action="decimal">.</button> <button class="calc-btn equals-btn h-16 rounded-2xl text-2xl font-semibold text-white" style="background: var(--equals-bg);" data-action="equals">=</button> <!-- Row 6 - Extra functions --> <button class="calc-btn function-btn h-14 rounded-2xl text-lg font-semibold" style="background: var(--function-bg); color: var(--text-primary);" data-action="backspace">
      <svg class="w-6 h-6 mx-auto" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M3 12l6.414-6.414a2 2 0 011.414-.586H19a2 2 0 012 2v10a2 2 0 01-2 2h-8.172a2 2 0 01-1.414-.586L3 12z" />
      </svg></button> <button class="calc-btn function-btn h-14 rounded-2xl text-lg font-semibold col-span-2" style="background: var(--function-bg); color: var(--text-primary);" data-action="copy"> <span class="flex items-center justify-center gap-2">
       <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
       </svg> Nusxalash </span> </button> <button class="calc-btn function-btn h-14 rounded-2xl text-sm font-semibold" style="background: var(--accent); color: white;" data-action="sqrt">√</button>
    </div>
   </div><!-- Keyboard hint -->
